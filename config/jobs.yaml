- id: d5d5c472058d
  name: invest-weekly
  schedule: 0 20 * * 0
  notify_bot: invest
  llm:
    effort: max
  prompt: 执行投资雷达周度综合分析：python3 .claude/skills/invest-radar/scripts/invest_ctl.py weekly --format card，直接输出分析结果（系统自动投递到投资 bot）。同时生成飞书文档保存详细报告。
- id: dab3f1803fa7
  name: invest-event-check
  schedule: 0 */2 * * *
  notify_bot: invest
  prompt: 执行投资雷达事件检查：python3 .claude/skills/invest-radar/scripts/invest_ctl.py event-check，如果检测到重要事件，直接输出事件分析（系统自动投递到投资 bot）。无事件时输出 INVEST_SILENT。
- id: 276f501674ac
  name: invest-monthly-review
  schedule: 0 9 1 * *
  notify_bot: invest
  llm:
    effort: max
  prompt: 执行投资雷达月度回顾：python3 .claude/skills/invest-radar/scripts/invest_ctl.py record --review，汇总本月预测准确率和板块表现，生成飞书文档月报。
- id: d79c2179f250
  name: invest-daily-check
  schedule: 0 20 * * 1-5
  notify_bot: invest
  prompt: 执行投资雷达每日市场简检：python3 .claude/skills/invest-radar/scripts/invest_ctl.py timing 获取择时信号，python3 .claude/skills/invest-radar/scripts/invest_ctl.py
    macro 获取宏观状态。综合两项结果，直接输出完整的每日简检报告（系统自动投递到投资 bot，不要自己发通知）。包含宏观体制、择时信号、建议仓位、关注信号、偏好板块。
