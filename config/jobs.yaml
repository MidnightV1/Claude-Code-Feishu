jobs:
- id: 061e907590c0
  name: garmin-daily
  schedule: 0 8 * * 2-5
  notify_bot: health
  prompt: 执行佳明健康日报：使用 garmin-health skill 生成今日健康简报，直接输出结果（系统自动投递到健康 bot）。
